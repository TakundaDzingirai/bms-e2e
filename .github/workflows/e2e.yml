name: e2e

# Runs the typed API suite against a freshly-built BSMS app backed by a local
# Supabase stack (Postgres + Auth in Docker, seeded). Triggers:
#   - push / PR to bms-e2e         (validate the suite + client)
#   - manual (workflow_dispatch)   (run on demand)
#   - daily schedule               (catch app/contract drift even with no commits)
on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      # Check the two repos out as SIBLINGS (not nested) so Next doesn't see two
      # lockfiles and mis-infer its workspace root.
      - name: Checkout bms-e2e (this repo)
        uses: actions/checkout@v4
        with:
          path: e2e

      - name: Checkout bsms (app under test)
        uses: actions/checkout@v4
        with:
          repository: Taku-10/bsms
          path: bsms
          # bsms is private and on another account → needs a repo-scoped PAT in
          # the BSMS_CHECKOUT_TOKEN secret.
          token: ${{ secrets.BSMS_CHECKOUT_TOKEN || github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase (applies baseline migration + seed)
        working-directory: bsms
        run: supabase start

      - name: Capture local Supabase env
        working-directory: bsms
        run: |
          API_URL=$(supabase status -o env | grep '^API_URL=' | cut -d'"' -f2)
          ANON=$(supabase status -o env | grep '^ANON_KEY=' | cut -d'"' -f2)
          SERVICE=$(supabase status -o env | grep '^SERVICE_ROLE_KEY=' | cut -d'"' -f2)
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE"
            echo "NEXT_PUBLIC_BUSINESS_TIMEZONE=America/Regina"
            echo "SUPABASE_URL=$API_URL"
            echo "SUPABASE_ANON_KEY=$ANON"
            echo "APP_BASE_URL=http://127.0.0.1:3000"
            echo "E2E_ADMIN_EMAIL=admin"
            echo "E2E_ADMIN_PASSWORD=Password123!"
          } >> "$GITHUB_ENV"

      - name: Build the bsms app (against local Supabase)
        working-directory: bsms
        run: |
          npm install --no-audit --no-fund
          npm run gen:openapi
          npm run build

      - name: Start the app and wait for readiness
        working-directory: bsms
        run: |
          nohup npm run start > /tmp/bsms-app.log 2>&1 &
          echo "started app pid $!"
          for i in $(seq 1 90); do
            if curl -fsS -o /dev/null http://127.0.0.1:3000/api/storefront/booking-status; then
              echo "app ready after ~$((i * 2))s"; exit 0
            fi
            sleep 2
          done
          echo "::error::App did not become ready on :3000"; cat /tmp/bsms-app.log; exit 1

      - name: Run typed e2e suite
        working-directory: e2e
        run: |
          npm install --no-audit --no-fund
          npm run sync:spec          # default path ../bsms/openapi/openapi.json (siblings)
          npm run gen:types
          npm test

      - name: Show app log
        if: always()
        run: cat /tmp/bsms-app.log || true

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14
